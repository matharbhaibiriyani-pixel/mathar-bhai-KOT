<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Mathar Bhai — POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Karla:wght@400;500;700&family=Space+Mono:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #241A14; --ember: #B23A2E; --ember-dark: #8E2E24;
    --saffron: #E3A83B; --curry: #4F5D3A; --curry-bright: #7C9463;
    --clay: #7A4B32; --paper: #FBF6E9; --paper-dim: #F0E8D5;
    --font-display: 'Fraunces', serif; --font-body: 'Karla', sans-serif; --font-mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--paper); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--clay); background: #1D140F;
    position: sticky; top: 0; z-index: 5;
  }
  .topbar__title { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; margin: 0; }
  .topbar__subtitle { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--saffron); margin: 0.1rem 0 0; }
  .topbar__right { display: flex; align-items: center; gap: 0.6rem; }

  .pill-btn {
    background: none; border: 1px solid var(--clay); color: var(--paper);
    font-family: var(--font-body); font-size: 0.8rem;
    padding: 0.45rem 0.9rem; border-radius: 999px; cursor: pointer;
  }
  .pill-btn:hover { border-color: var(--saffron); color: var(--saffron); }
  .pill-btn--active { border-color: var(--saffron); color: var(--saffron); background: rgba(227,168,59,0.08); }

  .layout { display: grid; grid-template-columns: 1fr 380px; min-height: calc(100vh - 65px); }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .menu-panel { padding: 1.25rem; overflow-y: auto; }
  .order-type-row { display: flex; gap: 0.6rem; margin-bottom: 1.25rem; }
  .order-type-btn {
    flex: 1; padding: 0.8rem; border-radius: 12px; border: 2px solid var(--clay);
    background: var(--ink); color: var(--paper); font-family: var(--font-body); font-weight: 700;
    font-size: 0.95rem; cursor: pointer;
  }
  .order-type-btn--active { border-color: var(--ember); background: rgba(178,58,46,0.15); color: var(--saffron); }

  .category-label {
    font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--curry-bright); margin: 1.2rem 0 0.7rem 0.1rem;
  }
  .category-label:first-of-type { margin-top: 0; }

  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.6rem; }

  .item-tile {
    background: var(--paper); color: var(--ink); border-radius: 12px; padding: 0.8rem 0.9rem;
    display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
  }
  .item-tile__name { font-family: 'Noto Sans Tamil', var(--font-body); font-weight: 700; font-size: 0.92rem; line-height: 1.25; }
  .item-tile__price { font-family: var(--font-mono); font-size: 0.78rem; color: var(--clay); }

  .stepper { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; }
  .stepper-btn {
    width: 26px; height: 26px; border-radius: 50%; border: none; background: var(--ember);
    color: var(--paper); font-family: var(--font-mono); font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper-btn:active { background: var(--ember-dark); }
  .stepper-qty { font-family: var(--font-mono); font-weight: 700; min-width: 1.4ch; text-align: center; }
  .add-tile-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--ember); background: transparent;
    color: var(--ember-dark); font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  }

  .bill-panel {
    background: #1D140F; border-left: 1px solid var(--clay);
    padding: 1.25rem; display: flex; flex-direction: column;
  }
  .bill-panel__title { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; margin: 0 0 1rem; }

  .bill-lines { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
  .bill-line {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0; border-bottom: 1px dashed var(--clay); font-size: 0.88rem;
  }
  .bill-line__name { font-family: 'Noto Sans Tamil', var(--font-body); flex: 1; padding-right: 0.5rem; }
  .bill-line__qty { font-family: var(--font-mono); color: var(--saffron); margin-right: 0.4rem; }
  .bill-line__remove { background: none; border: none; color: var(--clay); cursor: pointer; font-size: 0.9rem; margin-left: 0.5rem; }

  .bill-empty { text-align: center; color: var(--clay); font-family: var(--font-mono); font-size: 0.85rem; padding: 2rem 0; }

  .bill-total-row {
    display: flex; justify-content: space-between; font-family: var(--font-mono); font-weight: 700;
    font-size: 1.15rem; padding: 0.8rem 0; border-top: 2px solid var(--clay); margin-bottom: 1rem;
  }

  .payment-row { display: flex; gap: 0.6rem; margin-bottom: 1rem; }
  .payment-btn {
    flex: 1; padding: 0.7rem; border-radius: 10px; border: 2px solid var(--clay);
    background: transparent; color: var(--paper); font-weight: 700; cursor: pointer;
  }
  .payment-btn--active { border-color: var(--saffron); background: rgba(227,168,59,0.12); color: var(--saffron); }

  .printer-status {
    font-family: var(--font-mono); font-size: 0.72rem; color: var(--clay);
    display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.8rem;
  }
  .printer-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--clay); }
  .printer-dot--connected { background: var(--curry-bright); }

  .primary-btn {
    width: 100%; padding: 0.95rem; border: none; border-radius: 12px;
    background: var(--ember); color: var(--paper); font-family: var(--font-body);
    font-weight: 700; font-size: 1rem; cursor: pointer; margin-bottom: 0.6rem;
  }
  .primary-btn:hover { background: var(--ember-dark); }
  .primary-btn:disabled { opacity: 0.5; cursor: default; }

  .secondary-btn {
    width: 100%; padding: 0.7rem; border: 1px solid var(--clay); border-radius: 12px;
    background: transparent; color: var(--paper); font-family: var(--font-body); font-size: 0.85rem; cursor: pointer;
  }
  .secondary-btn:hover { border-color: var(--saffron); color: var(--saffron); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ember-dark); color: var(--paper); padding: 0.7rem 1.2rem; border-radius: 999px;
    font-size: 0.85rem; z-index: 60; display: none; max-width: 90%; text-align: center;
  }
  .toast.visible { display: block; }
  .toast.success { background: var(--curry); }

  .auth-gate {
    position: fixed; inset: 0; background: var(--ink); display: flex; align-items: center; justify-content: center;
    z-index: 100; font-family: var(--font-mono); color: var(--saffron); font-size: 0.9rem;
  }

  #receipt-canvas { display: none; }
</style>
</head>
<body>

<div class="auth-gate" id="auth-gate">Checking login…</div>

<div class="topbar">
  <div>
    <p class="topbar__title">Hotel Mathar Bhai</p>
    <p class="topbar__subtitle">POS Billing</p>
  </div>
  <div class="topbar__right">
    <span class="printer-status"><span class="printer-dot" id="printer-dot"></span><span id="printer-label">Printer not connected</span></span>
    <button class="pill-btn" id="connect-printer-btn">Connect printer</button>
    <button class="pill-btn" onclick="window.location.href='dashboard.html'">Dashboard</button>
    <button class="pill-btn" id="logout-btn">Log out</button>
  </div>
</div>

<div class="layout">
  <div class="menu-panel">
    <div class="order-type-row">
      <button class="order-type-btn order-type-btn--active" id="type-parcel">📦 Parcel</button>
      <button class="order-type-btn" id="type-dinein">🍽 Dine-in</button>
    </div>
    <div id="menu-items"></div>
  </div>

  <div class="bill-panel">
    <p class="bill-panel__title">Current Bill</p>
    <div class="bill-lines" id="bill-lines"></div>
    <div class="bill-total-row"><span>Total</span><span id="bill-total">₹0</span></div>

    <div class="payment-row">
      <button class="payment-btn payment-btn--active" id="pay-cash">Cash</button>
      <button class="payment-btn" id="pay-upi">UPI</button>
    </div>

    <button class="primary-btn" id="checkout-btn">Generate &amp; Print Bill</button>
    <button class="secondary-btn" id="clear-bill-btn">Clear bill</button>
  </div>
</div>

<canvas id="receipt-canvas"></canvas>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDiB9xbeRHC91Pyvw1pr1odagfHck01dOA",
    authDomain: "hotel-mathar-bhai-orders.firebaseapp.com",
    projectId: "hotel-mathar-bhai-orders",
    storageBucket: "hotel-mathar-bhai-orders.firebasestorage.app",
    messagingSenderId: "106949196895",
    appId: "1:106949196895:web:b320878772de39eab8afea"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "pos-login.html"; return; }
    document.getElementById("auth-gate").style.display = "none";
  });

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "pos-login.html";
  });

  window.__db = db;
  window.__collection = collection;
  window.__addDoc = addDoc;
  window.__serverTimestamp = serverTimestamp;
  window.__firebaseReady = true;
</script>

    { id: "beef-pakora", category: "பீஃப்", name: "பீஃப் பக்கோடா (100g)", price: 90 },
    { id: "beef-roast", category: "பீஃப்", name: "பீஃப் ரோஸ்ட்", price: 120 },
    { id: "beef-gravy", category: "பீஃப்", name: "பீஃப் கிரேவி", price: 150 },
    { id: "beef-pepper-roast", category: "பீஃப்", name: "பீஃப் Pepper ரோஸ்ட்", price: 140 },
    { id: "beef-pepper-gravy", category: "பீஃப்", name: "பீஃப் Pepper கிரேவி", price: 170 },
    { id: "chicken-65", category: "சிக்கன்", name: "சிக்கன் 65 (100g)", price: 80 },
    { id: "chicken-chilli-gravy", category: "சிக்கன்", name: "சிக்கன் சில்லி கிரேவி", price: 110 },
    { id: "chilli-chicken", category: "சிக்கன்", name: "சில்லி சிக்கன்", price: 140 },
    { id: "pepper-chicken", category: "சிக்கன்", name: "Pepper சிக்கன்", price: 140 },
    { id: "kudal-fry", category: "குடல் & சூப்", name: "குடல் ஃப்ரை", price: 80 },
    { id: "mattu-vaal-soup", category: "குடல் & சூப்", name: "மாட்டு வால் சூப்", price: 20 },
    { id: "omelette", category: "முட்டை", name: "ஆம்லெட்", price: 20 },
    { id: "full-boil", category: "முட்டை", name: "ஃபுல் பாயில்", price: 15 },
    { id: "half-boil", category: "முட்டை", name: "ஆஃப் பாயில்", price: 15 },
    { id: "kalakki", category: "முட்டை", name: "கலக்கி", price: 20 },
    { id: "mutta-poriyal", category: "முட்டை", name: "முட்டை பொரியல்", price: 30 }
  ];

  function formatPrice(n) { return "\u20B9" + n; }

  // ---------- State ----------
  const bill = {}; // { itemId: qty }
  let orderType = "parcel"; // "parcel" | "dinein"
  let paymentMethod = "cash"; // "cash" | "upi"
  let printerCharacteristic = null;

  // ---------- Menu rendering ----------
  function renderMenuItems() {
    const container = document.getElementById("menu-items");
    container.innerHTML = "";
    CATEGORIES.forEach(category => {
      const items = MENU.filter(i => i.category === category);
      if (items.length === 0) return;
      const heading = document.createElement("p");
      heading.className = "category-label";
      heading.textContent = category;
      container.appendChild(heading);

      const grid = document.createElement("div");
      grid.className = "item-grid";
      items.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "item-tile";
        tile.id = "tile-" + item.id;
        renderTileControl(tile, item);
        grid.appendChild(tile);
      });
      container.appendChild(grid);
    });
  }

  function renderTileControl(tile, item) {
    const qty = bill[item.id] || 0;
    tile.innerHTML = `
      <div>
        <div class="item-tile__name">${item.name}</div>
        <div class="item-tile__price">${formatPrice(item.price)}</div>
      </div>
    `;
    if (qty === 0) {
      const btn = document.createElement("button");
      btn.className = "add-tile-btn";
      btn.textContent = "+";
      btn.onclick = () => setQty(item.id, 1);
      tile.appendChild(btn);
    } else {
      const stepper = document.createElement("div");
      stepper.className = "stepper";
      stepper.innerHTML = `
        <button class="stepper-btn" data-d="-1">&minus;</button>
        <span class="stepper-qty">${qty}</span>
        <button class="stepper-btn" data-d="1">+</button>
      `;
      stepper.querySelectorAll(".stepper-btn").forEach(b => {
        b.onclick = () => setQty(item.id, qty + parseInt(b.dataset.d));
      });
      tile.appendChild(stepper);
    }
  }

  function setQty(itemId, qty) {
    qty = Math.max(0, qty);
    if (qty === 0) delete bill[itemId]; else bill[itemId] = qty;
    const item = MENU.find(i => i.id === itemId);
    renderTileControl(document.getElementById("tile-" + itemId), item);
    renderBill();
  }

  function renderBill() {
    const container = document.getElementById("bill-lines");
    const entries = Object.entries(bill).filter(([, qty]) => qty > 0);

    if (entries.length === 0) {
      container.innerHTML = `<div class="bill-empty">No items yet.<br>Tap items on the left to add them.</div>`;
      document.getElementById("bill-total").textContent = formatPrice(0);
      return;
    }

    let total = 0;
    container.innerHTML = entries.map(([itemId, qty]) => {
      const item = MENU.find(i => i.id === itemId);
      const lineTotal = item.price * qty;
      total += lineTotal;
      return `
        <div class="bill-line">
          <span class="bill-line__name"><span class="bill-line__qty">${qty}×</span>${item.name}</span>
          <span>${formatPrice(lineTotal)}</span>
          <button class="bill-line__remove" onclick="setQty('${itemId}', 0)">✕</button>
        </div>
      `;
    }).join("");
    document.getElementById("bill-total").textContent = formatPrice(total);
  }

  // ---------- Order type / payment toggles ----------
  document.getElementById("type-parcel").onclick = () => {
    orderType = "parcel";
    document.getElementById("type-parcel").classList.add("order-type-btn--active");
    document.getElementById("type-dinein").classList.remove("order-type-btn--active");
  };
  document.getElementById("type-dinein").onclick = () => {
    orderType = "dinein";
    document.getElementById("type-dinein").classList.add("order-type-btn--active");
    document.getElementById("type-parcel").classList.remove("order-type-btn--active");
  };
  document.getElementById("pay-cash").onclick = () => {
    paymentMethod = "cash";
    document.getElementById("pay-cash").classList.add("payment-btn--active");
    document.getElementById("pay-upi").classList.remove("payment-btn--active");
  };
  document.getElementById("pay-upi").onclick = () => {
    paymentMethod = "upi";
    document.getElementById("pay-upi").classList.add("payment-btn--active");
    document.getElementById("pay-cash").classList.remove("payment-btn--active");
  };

  document.getElementById("clear-bill-btn").onclick = () => {
    Object.keys(bill).forEach(k => delete bill[k]);
    renderMenuItems();
    renderBill();
  };

  function showToast(msg, success) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = "toast visible" + (success ? " success" : "");
    setTimeout(() => { toast.className = "toast"; }, 3500);
  }

  // ---------- Bluetooth printer connection ----------
  document.getElementById("connect-printer-btn").onclick = async () => {
    if (!navigator.bluetooth) {
      showToast("Web Bluetooth isn't supported in this browser. Use Chrome on Windows/Mac/Android.");
      return;
    }
    try {
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [0x18F0, 0xFF00, 0xFFE0, '49535343-fe7d-4ae5-8fa9-9fafd205e455', '000018f0-0000-1000-8000-00805f9b34fb']
      });
      const server = await device.gatt.connect();
      const services = await server.getPrimaryServices();
      let found = null;
      for (const service of services) {
        const chars = await service.getCharacteristics();
        for (const ch of chars) {
          if (ch.properties.write || ch.properties.writeWithoutResponse) { found = ch; break; }
        }
        if (found) break;
      }
      if (!found) throw new Error("No writable characteristic found on this printer.");
      printerCharacteristic = found;
      document.getElementById("printer-dot").classList.add("printer-dot--connected");
      document.getElementById("printer-label").textContent = "Printer: " + (device.name || "connected");
      showToast("Printer connected.", true);
    } catch (err) {
      console.error(err);
      showToast("Couldn't connect to printer: " + err.message);
    }
  };

  async function sendToPrinter(bytes) {
    if (!printerCharacteristic) throw new Error("Printer not connected");
    const chunkSize = 20; // conservative default BLE MTU
    for (let i = 0; i < bytes.length; i += chunkSize) {
      const chunk = bytes.slice(i, i + chunkSize);
      await printerCharacteristic.writeValue(chunk);
      await new Promise(r => setTimeout(r, 8));
    }
  }

  // ---------- Receipt rendering (as image, for Tamil script support) ----------
  function buildReceiptCanvas(billNo, type, lines, total, payment) {
    const WIDTH = 384; // standard dot-width for 58mm ESC/POS printers
    const canvas = document.getElementById("receipt-canvas");
    const ctx = canvas.getContext("2d");

    const lineHeight = 26;
    const itemLines = lines.length;
    const headerHeight = 130;
    const footerHeight = 90;
    const height = headerHeight + itemLines * lineHeight + footerHeight;

    canvas.width = WIDTH;
    canvas.height = height;

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, WIDTH, height);
    ctx.fillStyle = "#000";
    ctx.textBaseline = "top";

    let y = 10;
    ctx.font = "bold 22px 'Noto Sans Tamil', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Hotel Mathar Bhai", WIDTH / 2, y);
    y += 30;

    ctx.font = "13px monospace";
    ctx.fillText(type === "parcel" ? "PARCEL" : "DINE-IN", WIDTH / 2, y);
    y += 20;
    ctx.fillText("Bill #" + billNo, WIDTH / 2, y);
    y += 18;
    ctx.fillText(new Date().toLocaleString(), WIDTH / 2, y);
    y += 22;

    ctx.textAlign = "left";
    ctx.beginPath(); ctx.moveTo(10, y); ctx.lineTo(WIDTH - 10, y); ctx.strokeStyle = "#000"; ctx.stroke();
    y += 10;

    ctx.font = "15px 'Noto Sans Tamil', sans-serif";
    lines.forEach(l => {
      ctx.textAlign = "left";
      ctx.fillText(`${l.qty}x ${l.name}`, 12, y);
      ctx.textAlign = "right";
      ctx.font = "14px monospace";
      ctx.fillText(String(l.lineTotal), WIDTH - 12, y);
      ctx.font = "15px 'Noto Sans Tamil', sans-serif";
      y += lineHeight;
    });

    ctx.beginPath(); ctx.moveTo(10, y); ctx.lineTo(WIDTH - 10, y); ctx.stroke();
    y += 12;

    ctx.font = "bold 18px monospace";
    ctx.textAlign = "left";
    ctx.fillText("TOTAL", 12, y);
    ctx.textAlign = "right";
    ctx.fillText("Rs " + total, WIDTH - 12, y);
    y += 26;

    ctx.font = "14px monospace";
    ctx.textAlign = "center";
    ctx.fillText("Paid via " + payment.toUpperCase(), WIDTH / 2, y);
    y += 22;
    ctx.fillText("Thank you, visit again!", WIDTH / 2, y);

    return canvas;
  }

  function canvasToRaster(canvas) {
    const ctx = canvas.getContext("2d");
    const { width, height } = canvas;
    const imgData = ctx.getImageData(0, 0, width, height).data;
    const widthBytes = Math.ceil(width / 8);
    const bitmap = new Uint8Array(widthBytes * height);

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const idx = (y * width + x) * 4;
        const r = imgData[idx], g = imgData[idx + 1], b = imgData[idx + 2];
        const luminance = 0.299 * r + 0.587 * g + 0.114 * b;
        if (luminance < 160) {
          const byteIndex = y * widthBytes + Math.floor(x / 8);
          bitmap[byteIndex] |= (0x80 >> (x % 8));
        }
      }
    }

    const xL = widthBytes & 0xFF, xH = (widthBytes >> 8) & 0xFF;
    const yL = height & 0xFF, yH = (height >> 8) & 0xFF;
    const header = new Uint8Array([0x1D, 0x76, 0x30, 0x00, xL, xH, yL, yH]);
    const out = new Uint8Array(header.length + bitmap.length);
    out.set(header, 0);
    out.set(bitmap, header.length);
    return out;
  }

  async function printReceipt(billNo, type, lines, total, payment) {
    const canvas = buildReceiptCanvas(billNo, type, lines, total, payment);
    const raster = canvasToRaster(canvas);
    const init = new Uint8Array([0x1B, 0x40]); // ESC @ initialize
    const feedAndCut = new Uint8Array([0x0A, 0x0A, 0x0A, 0x1D, 0x56, 0x42, 0x00]); // feed + partial cut

    const full = new Uint8Array(init.length + raster.length + feedAndCut.length);
    full.set(init, 0);
    full.set(raster, init.length);
    full.set(feedAndCut, init.length + raster.length);

    await sendToPrinter(full);
  }

  // ---------- Checkout ----------
  document.getElementById("checkout-btn").onclick = async () => {
    const entries = Object.entries(bill).filter(([, qty]) => qty > 0);
    if (entries.length === 0) { showToast("Add at least one item first."); return; }
    if (!window.__firebaseReady) { showToast("Connection not ready — try again in a moment."); return; }

    const btn = document.getElementById("checkout-btn");
    btn.disabled = true;
    btn.textContent = "Processing...";

    let total = 0;
    const lines = entries.map(([itemId, qty]) => {
      const item = MENU.find(i => i.id === itemId);
      const lineTotal = item.price * qty;
      total += lineTotal;
      return { name: item.name, qty, price: item.price, lineTotal };
    });

    const billNo = Math.floor(1000 + Math.random() * 9000);
    const token = Math.floor(100 + Math.random() * 900);

    try {
      // Always record the sale for the dashboard
      await window.__addDoc(window.__collection(window.__db, "bills"), {
        billNo,
        type: orderType,
        items: lines,
        total,
        paymentMethod,
        createdAt: window.__serverTimestamp()
      });

      // Parcel orders also go to the KOT board
      if (orderType === "parcel") {
        await window.__addDoc(window.__collection(window.__db, "orders"), {
          token,
          items: lines,
          total,
          status: "new",
          placedAt: window.__serverTimestamp()
        });
      }

      // Print, if a printer is connected — but don't block the sale record on it
      if (printerCharacteristic) {
        try {
          await printReceipt(billNo, orderType, lines, total, paymentMethod);
        } catch (printErr) {
          console.error(printErr);
          showToast("Bill saved, but printing failed: " + printErr.message);
        }
      } else {
        showToast("Bill saved (printer not connected — connect it to print).");
      }

      showToast(`Bill #${billNo} saved` + (orderType === "parcel" ? ` — sent to KOT as #${token}` : ""), true);

      Object.keys(bill).forEach(k => delete bill[k]);
      renderMenuItems();
      renderBill();
    } catch (err) {
      console.error(err);
      showToast("Could not save this bill — check your connection and try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Generate & Print Bill";
    }
  };

  window.setQty = setQty;

  renderMenuItems();
  renderBill();
</script>
