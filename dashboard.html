<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Mathar Bhai — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Karla:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #241A14; --ember: #B23A2E; --ember-dark: #8E2E24;
    --saffron: #E3A83B; --curry: #4F5D3A; --curry-bright: #7C9463;
    --clay: #7A4B32; --paper: #FBF6E9;
    --font-display: 'Fraunces', serif; --font-body: 'Karla', sans-serif; --font-mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--paper); font-family: var(--font-body); -webkit-font-smoothing: antialiased; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--clay); background: #1D140F;
  }
  .topbar__title { font-family: var(--font-display); font-weight: 900; font-size: 1.5rem; margin: 0; }
  .topbar__subtitle { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--saffron); margin: 0.15rem 0 0; }

  .pill-btn {
    background: none; border: 1px solid var(--clay); color: var(--paper);
    font-family: var(--font-body); font-size: 0.8rem; padding: 0.45rem 0.9rem; border-radius: 999px; cursor: pointer;
  }
  .pill-btn:hover { border-color: var(--saffron); color: var(--saffron); }

  .content { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--paper); color: var(--ink); border-radius: 16px; padding: 1.4rem 1.5rem; position: relative; overflow: hidden; }
  .stat-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--ember); }
  .stat-card__label { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--clay); margin: 0 0 0.5rem; }
  .stat-card__value { font-family: var(--font-display); font-weight: 900; font-size: 2rem; margin: 0; }
  .stat-card__sub { font-family: var(--font-mono); font-size: 0.78rem; color: var(--clay); margin-top: 0.3rem; }

  .section-title {
    font-family: var(--font-display); font-weight: 900; font-size: 1.3rem;
    margin: 0 0 1rem;
  }

  .bill-table { width: 100%; border-collapse: collapse; background: var(--paper); color: var(--ink); border-radius: 12px; overflow: hidden; }
  .bill-table th, .bill-table td { text-align: left; padding: 0.7rem 1rem; font-size: 0.88rem; }
  .bill-table th { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--clay); border-bottom: 2px solid var(--clay); }
  .bill-table td { border-bottom: 1px solid #E5D6B4; }
  .bill-table tr:last-child td { border-bottom: none; }
  .tag { font-family: var(--font-mono); font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 999px; }
  .tag--parcel { background: rgba(178,58,46,0.12); color: var(--ember-dark); }
  .tag--dinein { background: rgba(79,93,58,0.15); color: var(--curry); }
  .tag--cash { background: rgba(227,168,59,0.15); color: var(--ember-dark); }
  .tag--upi { background: rgba(122,75,50,0.15); color: var(--clay); }

  .empty-state { text-align: center; color: var(--clay); font-family: var(--font-mono); font-size: 0.9rem; padding: 3rem 1rem; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <p class="topbar__title">Hotel Mathar Bhai</p>
    <p class="topbar__subtitle">Today's Sales</p>
  </div>
  <div style="display:flex; gap:0.6rem;">
    <button class="pill-btn" onclick="window.location.href='pos.html'">Back to POS</button>
  </div>
</div>

<div class="content">
  <div class="stat-grid">
    <div class="stat-card">
      <p class="stat-card__label">Total Sales</p>
      <p class="stat-card__value" id="stat-total">₹0</p>
      <p class="stat-card__sub" id="stat-count">0 bills</p>
    </div>
    <div class="stat-card">
      <p class="stat-card__label">Cash</p>
      <p class="stat-card__value" id="stat-cash">₹0</p>
    </div>
    <div class="stat-card">
      <p class="stat-card__label">UPI</p>
      <p class="stat-card__value" id="stat-upi">₹0</p>
    </div>
    <div class="stat-card">
      <p class="stat-card__label">Parcel vs Dine-in</p>
      <p class="stat-card__value" id="stat-split" style="font-size:1.3rem;">0 / 0</p>
    </div>
  </div>

  <p class="section-title">Today's Bills</p>
  <table class="bill-table" id="bill-table">
    <thead>
      <tr><th>Bill #</th><th>Time</th><th>Type</th><th>Payment</th><th>Total</th></tr>
    </thead>
    <tbody id="bill-table-body"></tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, orderBy, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDiB9xbeRHC91Pyvw1pr1odagfHck01dOA",
    authDomain: "hotel-mathar-bhai-orders.firebaseapp.com",
    projectId: "hotel-mathar-bhai-orders",
    storageBucket: "hotel-mathar-bhai-orders.firebasestorage.app",
    messagingSenderId: "106949196895",
    appId: "1:106949196895:web:b320878772de39eab8afea"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  startBillsListener();

  function startBillsListener() {
    const startOfToday = new Date();
    startOfToday.setHours(0, 0, 0, 0);
    const startTimestamp = Timestamp.fromDate(startOfToday);

    const billsQuery = query(
      collection(db, "bills"),
      where("createdAt", ">=", startTimestamp),
      orderBy("createdAt", "desc")
    );

    onSnapshot(billsQuery, (snapshot) => {
      const bills = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderDashboard(bills);
    }, (err) => {
      console.error(err);
      document.getElementById("stat-count").textContent = "Connection error";
    });
  }

  function renderDashboard(bills) {
    let total = 0, cash = 0, upi = 0, parcelCount = 0, dineinCount = 0;

    bills.forEach(b => {
      total += b.total || 0;
      if (b.paymentMethod === "cash") cash += b.total || 0;
      if (b.paymentMethod === "upi") upi += b.total || 0;
      if (b.type === "parcel") parcelCount++;
      if (b.type === "dinein") dineinCount++;
    });

    document.getElementById("stat-total").textContent = "₹" + total;
    document.getElementById("stat-count").textContent = bills.length + " bill" + (bills.length === 1 ? "" : "s");
    document.getElementById("stat-cash").textContent = "₹" + cash;
    document.getElementById("stat-upi").textContent = "₹" + upi;
    document.getElementById("stat-split").textContent = `${parcelCount} / ${dineinCount}`;

    const tbody = document.getElementById("bill-table-body");
    if (bills.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No bills yet today.</div></td></tr>`;
      return;
    }

    tbody.innerHTML = bills.map(b => {
      const time = b.createdAt && b.createdAt.toDate
        ? b.createdAt.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        : "—";
      return `
        <tr>
          <td>#${b.billNo}</td>
          <td>${time}</td>
          <td><span class="tag ${b.type === "parcel" ? "tag--parcel" : "tag--dinein"}">${b.type === "parcel" ? "Parcel" : "Dine-in"}</span></td>
          <td><span class="tag ${b.paymentMethod === "cash" ? "tag--cash" : "tag--upi"}">${b.paymentMethod === "cash" ? "Cash" : "UPI"}</span></td>
          <td>₹${b.total}</td>
        </tr>
      `;
    }).join("");
  }
</script>

</body>
</html>
