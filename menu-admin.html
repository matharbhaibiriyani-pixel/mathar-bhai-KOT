<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Mathar Bhai — Manage Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Karla:wght@400;500;700&family=Space+Mono:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #241A14; --ember: #B23A2E; --ember-dark: #8E2E24;
    --saffron: #E3A83B; --curry: #4F5D3A; --curry-bright: #7C9463;
    --clay: #7A4B32; --paper: #FBF6E9;
    --font-display: 'Fraunces', serif; --font-body: 'Karla', sans-serif; --font-mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--paper); font-family: var(--font-body); -webkit-font-smoothing: antialiased; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 1.75rem; border-bottom: 1px solid var(--clay); background: #1D140F;
    flex-wrap: wrap; gap: 0.75rem;
  }
  .topbar__title { font-family: var(--font-display); font-weight: 900; font-size: 1.5rem; margin: 0; }
  .topbar__subtitle { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--saffron); margin: 0.15rem 0 0; }

  .pill-btn {
    background: none; border: 1px solid var(--clay); color: var(--paper);
    font-family: var(--font-body); font-size: 0.8rem; padding: 0.45rem 0.9rem; border-radius: 999px; cursor: pointer;
  }
  .pill-btn:hover { border-color: var(--saffron); color: var(--saffron); }

  .content { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

  .seed-banner {
    background: rgba(227,168,59,0.12); border: 1.5px dashed var(--saffron);
    border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 2rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .seed-banner p { margin: 0; font-size: 0.9rem; color: var(--paper); }
  .seed-btn {
    background: var(--saffron); color: var(--ink); border: none; border-radius: 10px;
    padding: 0.7rem 1.2rem; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }
  .seed-btn:hover { background: #f0ba55; }
  .seed-btn:disabled { opacity: 0.6; cursor: default; }

  .section-title { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; margin: 2rem 0 1rem; }
  .section-title:first-of-type { margin-top: 0; }

  .card { background: var(--paper); color: var(--ink); border-radius: 14px; padding: 1.25rem 1.4rem; }

  .add-form { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .add-form input, .add-form select {
    padding: 0.6rem 0.8rem; border-radius: 8px; border: 1.5px solid #DCCBA8;
    background: #fff; color: var(--ink); font-family: var(--font-body); font-size: 0.9rem;
  }
  .add-form input[type="text"].item-name { flex: 1; min-width: 160px; font-family: 'Noto Sans Tamil', var(--font-body); }
  .add-form input[type="number"] { width: 100px; }
  .add-form button {
    background: var(--ember); color: var(--paper); border: none; border-radius: 8px;
    padding: 0.6rem 1.1rem; font-weight: 700; cursor: pointer;
  }
  .add-form button:hover { background: var(--ember-dark); }

  .category-chip-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
  .category-chip {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--paper); color: var(--ink); border-radius: 999px; padding: 0.4rem 0.5rem 0.4rem 0.9rem;
    font-size: 0.85rem; font-weight: 700;
  }
  .category-chip button {
    background: rgba(178,58,46,0.12); color: var(--ember-dark); border: none; border-radius: 50%;
    width: 22px; height: 22px; cursor: pointer; font-size: 0.85rem; line-height: 1;
  }
  .category-chip .move-btn { background: rgba(122,75,50,0.12); color: var(--clay); }

  .item-row {
    display: flex; align-items: center; justify-content: space-between; gap: 0.8rem;
    padding: 0.7rem 0; border-bottom: 1px solid #E5D6B4;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row__name { font-family: 'Noto Sans Tamil', var(--font-body); font-weight: 700; font-size: 0.95rem; flex: 1; }
  .item-row__price-input {
    width: 90px; padding: 0.4rem 0.5rem; border-radius: 6px; border: 1.5px solid #DCCBA8;
    font-family: var(--font-mono); font-size: 0.88rem;
  }
  .item-row__save { background: var(--curry); color: var(--paper); border: none; border-radius: 6px; padding: 0.4rem 0.7rem; font-size: 0.78rem; cursor: pointer; }
  .item-row__delete { background: rgba(178,58,46,0.12); color: var(--ember-dark); border: none; border-radius: 6px; padding: 0.4rem 0.7rem; font-size: 0.78rem; cursor: pointer; }

  .category-block { margin-bottom: 1.5rem; }
  .category-block__label {
    font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--saffron); margin: 0 0 0.6rem 0.1rem;
  }

  .empty-state { text-align: center; color: var(--clay); font-family: var(--font-mono); font-size: 0.9rem; padding: 2rem 1rem; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ember-dark); color: var(--paper); padding: 0.7rem 1.2rem; border-radius: 999px;
    font-size: 0.85rem; z-index: 60; display: none; max-width: 90%; text-align: center;
  }
  .toast.visible { display: block; }
  .toast.success { background: var(--curry); }

  .auth-gate {
    position: fixed; inset: 0; background: var(--ink); display: flex; align-items: center; justify-content: center;
    z-index: 100; font-family: var(--font-mono); color: var(--saffron); font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="auth-gate" id="auth-gate">Checking login…</div>

<div class="topbar">
  <div>
    <p class="topbar__title">Hotel Mathar Bhai</p>
    <p class="topbar__subtitle">Manage Menu</p>
  </div>
  <div style="display:flex; gap:0.6rem; flex-wrap: wrap;">
    <button class="pill-btn" onclick="window.location.href='pos.html'">POS</button>
    <button class="pill-btn" onclick="window.location.href='dashboard.html'">Dashboard</button>
    <button class="pill-btn" id="logout-btn">Log out</button>
  </div>
</div>

<div class="content">

  <div class="seed-banner" id="seed-banner" style="display:none;">
    <p>Your menu is empty. Load the starter menu (9 categories, 38 dishes) to get going — you can edit or delete anything afterward.</p>
    <button class="seed-btn" id="seed-btn">Load starter menu</button>
  </div>

  <p class="section-title">Categories</p>
  <div class="card">
    <div class="add-form">
      <input type="text" id="new-category-name" placeholder="New category name (e.g. இனிப்பு)">
      <button id="add-category-btn">Add category</button>
    </div>
    <div class="category-chip-row" id="category-chip-row"></div>
  </div>

  <p class="section-title">Menu Items</p>
  <div class="card">
    <div class="add-form">
      <input type="text" class="item-name" id="new-item-name" placeholder="Item name">
      <select id="new-item-category"></select>
      <input type="number" id="new-item-price" placeholder="Price" min="0" step="1">
      <button id="add-item-btn">Add item</button>
    </div>
    <div id="items-by-category"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, setDoc,
    onSnapshot, getDoc, writeBatch
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDiB9xbeRHC91Pyvw1pr1odagfHck01dOA",
    authDomain: "hotel-mathar-bhai-orders.firebaseapp.com",
    projectId: "hotel-mathar-bhai-orders",
    storageBucket: "hotel-mathar-bhai-orders.firebasestorage.app",
    messagingSenderId: "106949196895",
    appId: "1:106949196895:web:b320878772de39eab8afea"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.__db = db;
  window.__doc = doc;
  window.__collection = collection;
  window.__addDoc = addDoc;
  window.__updateDoc = updateDoc;
  window.__deleteDoc = deleteDoc;
  window.__setDoc = setDoc;
  window.__onSnapshot = onSnapshot;
  window.__getDoc = getDoc;
  window.__writeBatch = writeBatch;
  window.__firebaseReady = true;

  function init() {
    startListeners();
    wireForms();
  }

  window.__init = init;

  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "pos-login.html"; return; }
    document.getElementById("auth-gate").style.display = "none";
    init();
  });

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "pos-login.html";
  });
</script>

<script>
  // ---------- Starter menu data (used only for the one-time seed button) ----------
  const STARTER_CATEGORIES = ["பிரியாணி","சைனீஸ்","புரோட்டா","சப்பாத்தி","இடியாப்பம்","பீஃப்","சிக்கன்","குடல் & சூப்","முட்டை"];
  const STARTER_ITEMS = [
    { category: "பிரியாணி", name: "சிக்கன் பிரியாணி", price: 130 },
    { category: "பிரியாணி", name: "பீஃப் பிரியாணி", price: 150 },
    { category: "பிரியாணி", name: "MT பிரியாணி", price: 110 },
    { category: "சைனீஸ்", name: "சிக்கன் ஃப்ரைடு ரைஸ்", price: 130 },
    { category: "சைனீஸ்", name: "Egg ஃப்ரைடு ரைஸ்", price: 110 },
    { category: "சைனீஸ்", name: "Veg ஃப்ரைடு ரைஸ்", price: 110 },
    { category: "சைனீஸ்", name: "பீஃப் ஃப்ரைடு ரைஸ்", price: 150 },
    { category: "சைனீஸ்", name: "சிக்கன் நூடுல்ஸ்", price: 130 },
    { category: "சைனீஸ்", name: "பீஃப் நூடுல்ஸ்", price: 150 },
    { category: "சைனீஸ்", name: "Egg நூடுல்ஸ்", price: 110 },
    { category: "சைனீஸ்", name: "Veg நூடுல்ஸ்", price: 110 },
    { category: "புரோட்டா", name: "புரோட்டா", price: 15 },
    { category: "புரோட்டா", name: "Egg கொத்து புரோட்டா", price: 120 },
    { category: "புரோட்டா", name: "சிக்கன் கொத்து புரோட்டா", price: 160 },
    { category: "புரோட்டா", name: "பீஃப் கொத்து புரோட்டா", price: 160 },
    { category: "சப்பாத்தி", name: "சப்பாத்தி", price: 15 },
    { category: "சப்பாத்தி", name: "Egg கொத்து சப்பாத்தி", price: 120 },
    { category: "சப்பாத்தி", name: "சிக்கன் கொத்து சப்பாத்தி", price: 160 },
    { category: "சப்பாத்தி", name: "பீஃப் கொத்து சப்பாத்தி", price: 160 },
    { category: "இடியாப்பம்", name: "இடியாப்பம்", price: 15 },
    { category: "இடியாப்பம்", name: "Egg கொத்து இடியாப்பம்", price: 130 },
    { category: "இடியாப்பம்", name: "சிக்கன் கொத்து இடியாப்பம்", price: 170 },
    { category: "பீஃப்", name: "பீஃப் பக்கோடா (100g)", price: 90 },
    { category: "பீஃப்", name: "பீஃப் ரோஸ்ட்", price: 120 },
    { category: "பீஃப்", name: "பீஃப் கிரேவி", price: 150 },
    { category: "பீஃப்", name: "பீஃப் Pepper ரோஸ்ட்", price: 140 },
    { category: "பீஃப்", name: "பீஃப் Pepper கிரேவி", price: 170 },
    { category: "சிக்கன்", name: "சிக்கன் 65 (100g)", price: 80 },
    { category: "சிக்கன்", name: "சிக்கன் சில்லி கிரேவி", price: 110 },
    { category: "சிக்கன்", name: "சில்லி சிக்கன்", price: 140 },
    { category: "சிக்கன்", name: "Pepper சிக்கன்", price: 140 },
    { category: "குடல் & சூப்", name: "குடல் ஃப்ரை", price: 80 },
    { category: "குடல் & சூப்", name: "மாட்டு வால் சூப்", price: 20 },
    { category: "முட்டை", name: "ஆம்லெட்", price: 20 },
    { category: "முட்டை", name: "ஃபுல் பாயில்", price: 15 },
    { category: "முட்டை", name: "ஆஃப் பாயில்", price: 15 },
    { category: "முட்டை", name: "கலக்கி", price: 20 },
    { category: "முட்டை", name: "முட்டை பொரியல்", price: 30 }
  ];

  let categories = [];
  let items = [];

  function showToast(msg, success) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = "toast visible" + (success ? " success" : "");
    setTimeout(() => { toast.className = "toast"; }, 3000);
  }

  function startListeners() {
    window.__onSnapshot(window.__doc(window.__db, "config", "categories"), (snap) => {
      categories = snap.exists() ? (snap.data().names || []) : [];
      renderCategoryChips();
      renderCategorySelect();
      maybeShowSeedBanner();
    });

    window.__onSnapshot(window.__collection(window.__db, "menu_items"), (snap) => {
      items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderItems();
      maybeShowSeedBanner();
    });
  }

  function maybeShowSeedBanner() {
    const banner = document.getElementById("seed-banner");
    banner.style.display = (categories.length === 0 && items.length === 0) ? "flex" : "none";
  }

  // ---------- Seed ----------
  document.addEventListener("click", async (e) => {
    if (e.target.id !== "seed-btn") return;
    const btn = e.target;
    btn.disabled = true;
    btn.textContent = "Loading...";
    try {
      await window.__setDoc(window.__doc(window.__db, "config", "categories"), { names: STARTER_CATEGORIES });
      const batch = window.__writeBatch(window.__db);
      STARTER_ITEMS.forEach(item => {
        const ref = window.__doc(window.__collection(window.__db, "menu_items"));
        batch.set(ref, item);
      });
      await batch.commit();
      showToast("Starter menu loaded!", true);
    } catch (err) {
      console.error(err);
      showToast("Could not load starter menu: " + err.message);
      btn.disabled = false;
      btn.textContent = "Load starter menu";
    }
  });

  // ---------- Category chips ----------
  function renderCategoryChips() {
    const row = document.getElementById("category-chip-row");
    if (categories.length === 0) {
      row.innerHTML = `<div class="empty-state">No categories yet.</div>`;
      return;
    }
    row.innerHTML = categories.map((cat, idx) => `
      <div class="category-chip">
        ${idx > 0 ? `<button class="move-btn" onclick="moveCategory(${idx}, -1)" title="Move left">&larr;</button>` : ""}
        <span>${cat}</span>
        ${idx < categories.length - 1 ? `<button class="move-btn" onclick="moveCategory(${idx}, 1)" title="Move right">&rarr;</button>` : ""}
        <button onclick="deleteCategory(${idx})" title="Delete category">✕</button>
      </div>
    `).join("");
  }

  function renderCategorySelect() {
    const select = document.getElementById("new-item-category");
    select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join("");
  }

  window.moveCategory = async (idx, dir) => {
    const newCats = [...categories];
    const target = idx + dir;
    if (target < 0 || target >= newCats.length) return;
    [newCats[idx], newCats[target]] = [newCats[target], newCats[idx]];
    await window.__setDoc(window.__doc(window.__db, "config", "categories"), { names: newCats });
  };

  window.deleteCategory = async (idx) => {
    const cat = categories[idx];
    const itemsInCat = items.filter(i => i.category === cat).length;
    if (itemsInCat > 0) {
      if (!confirm(`"${cat}" has ${itemsInCat} item(s) in it. Delete the category anyway? Those items will stay but won't show under any category until reassigned.`)) return;
    }
    const newCats = categories.filter((_, i) => i !== idx);
    await window.__setDoc(window.__doc(window.__db, "config", "categories"), { names: newCats });
  };

  document.getElementById("add-category-btn").addEventListener("click", async () => {
    const input = document.getElementById("new-category-name");
    const name = input.value.trim();
    if (!name) { showToast("Enter a category name."); return; }
    if (categories.includes(name)) { showToast("That category already exists."); return; }
    await window.__setDoc(window.__doc(window.__db, "config", "categories"), { names: [...categories, name] });
    input.value = "";
    showToast("Category added.", true);
  });

  // ---------- Items ----------
  function renderItems() {
    const container = document.getElementById("items-by-category");
    if (items.length === 0) {
      container.innerHTML = `<div class="empty-state">No items yet.</div>`;
      return;
    }

    const cats = categories.length > 0 ? categories : [...new Set(items.map(i => i.category))];

    container.innerHTML = cats.map(cat => {
      const catItems = items.filter(i => i.category === cat);
      if (catItems.length === 0) return "";
      const rows = catItems.map(item => `
        <div class="item-row">
          <span class="item-row__name">${item.name}</span>
          <span>₹</span>
          <input type="number" class="item-row__price-input" id="price-${item.id}" value="${item.price}" min="0" step="1">
          <button class="item-row__save" onclick="saveItemPrice('${item.id}')">Save</button>
          <button class="item-row__delete" onclick="deleteItem('${item.id}')">Delete</button>
        </div>
      `).join("");
      return `
        <div class="category-block">
          <p class="category-block__label">${cat}</p>
          ${rows}
        </div>
      `;
    }).join("");
  }

  window.saveItemPrice = async (itemId) => {
    const input = document.getElementById("price-" + itemId);
    const price = parseFloat(input.value);
    if (!price || price <= 0) { showToast("Enter a valid price."); return; }
    await window.__updateDoc(window.__doc(window.__db, "menu_items", itemId), { price });
    showToast("Price updated.", true);
  };

  window.deleteItem = async (itemId) => {
    if (!confirm("Delete this item? This can't be undone.")) return;
    await window.__deleteDoc(window.__doc(window.__db, "menu_items", itemId));
    showToast("Item deleted.", true);
  };

  document.getElementById("add-item-btn").addEventListener("click", async () => {
    const name = document.getElementById("new-item-name").value.trim();
    const category = document.getElementById("new-item-category").value;
    const price = parseFloat(document.getElementById("new-item-price").value);

    if (!name) { showToast("Enter an item name."); return; }
    if (!category) { showToast("Add a category first."); return; }
    if (!price || price <= 0) { showToast("Enter a valid price."); return; }

    await window.__addDoc(window.__collection(window.__db, "menu_items"), { name, category, price });
    document.getElementById("new-item-name").value = "";
    document.getElementById("new-item-price").value = "";
    showToast("Item added.", true);
  });

  function wireForms() {
    // forms are wired via addEventListener above at module-load time;
    // this function exists as an init hook in case ordering needs adjusting later.
  }
</script>

</body>
</html>
